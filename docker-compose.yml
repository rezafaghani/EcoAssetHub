services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecoassethub
      POSTGRES_USER: ecoasset
      POSTGRES_PASSWORD: ecoasset
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoasset -d ecoassethub"]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ecoassethub
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: src/EcoAssetHub.API/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=ecoassethub;Username=ecoasset;Password=ecoasset
      ConnectionStrings__ClickHouse: Host=clickhouse;Port=8123;Protocol=http;Database=ecoassethub;Username=default;Password=
    ports:
      - "5100:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  insert:
    build:
      context: .
      dockerfile: src/EcoAssetHub.Insert/Dockerfile
    environment:
      ConnectionStrings__ClickHouse: Host=clickhouse;Port=8123;Protocol=http;Database=ecoassethub;Username=default;Password=
    ports:
      - "5101:8080"
      - "5103:8081"
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: src/EcoAssetHub.Scheduler/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=ecoassethub;Username=ecoasset;Password=ecoasset
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: ecoassethub.ingestion.jobs
      Scheduler__PollingSeconds: 10
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: src/EcoAssetHub.Ingestion/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=ecoassethub;Username=ecoasset;Password=ecoasset
      InsertApi__GrpcUrl: http://insert:8081
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: ecoassethub.ingestion.jobs
      Ingestion__LookbackHours: 48
      Ingestion__BatchSize: 500
      Ingestion__MinRequestIntervalSeconds: 3
      Ingestion__MaxEnergyChartsRetries: 3
      Ingestion__RetryBaseDelaySeconds: 10
    restart: unless-stopped
    depends_on:
      insert:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: src/EcoAssetHub.Client/Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  clickhouse-data:
