name: timelens

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timelens}
      POSTGRES_USER: ${POSTGRES_USER:-timelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-timelens}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-timelens}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: src/TimeLens.API/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-timelens};Username=${POSTGRES_USER:-timelens};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      ConnectionStrings__ClickHouse: "Host=clickhouse;Port=8123;Protocol=http;Database=${CLICKHOUSE_DB:-timelens};Username=${CLICKHOUSE_USER:-default};Password=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-timelens}
      RabbitMq__UserName: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RabbitMq__ExchangeName: timelens.jobs
      RabbitMq__QueueName: timelens.ingestion.jobs
      RabbitMq__ValidationQueueName: timelens.validation.jobs
    ports:
      - "5100:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  insert:
    build:
      context: .
      dockerfile: src/TimeLens.Insert/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-timelens};Username=${POSTGRES_USER:-timelens};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      ConnectionStrings__ClickHouse: "Host=clickhouse;Port=8123;Protocol=http;Database=${CLICKHOUSE_DB:-timelens};Username=${CLICKHOUSE_USER:-default};Password=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}"
    ports:
      - "5101:8080"
      - "5103:8081"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: src/TimeLens.Scheduler/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-timelens};Username=${POSTGRES_USER:-timelens};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-timelens}
      RabbitMq__UserName: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RabbitMq__ExchangeName: timelens.jobs
      RabbitMq__QueueName: timelens.ingestion.jobs
      RabbitMq__ValidationQueueName: timelens.validation.jobs
      Scheduler__PollingSeconds: 10
      Scheduler__ExecutionApiBaseUrl: http://api:8080
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  validation-worker:
    build:
      context: .
      dockerfile: src/TimeLens.Validation.Worker/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-timelens};Username=${POSTGRES_USER:-timelens};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      ConnectionStrings__ClickHouse: "Host=clickhouse;Port=8123;Protocol=http;Database=${CLICKHOUSE_DB:-timelens};Username=${CLICKHOUSE_USER:-default};Password=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-timelens}
      RabbitMq__UserName: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RabbitMq__ExchangeName: timelens.jobs
      RabbitMq__ValidationQueueName: timelens.validation.jobs
    ports:
      - "5104:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: src/TimeLens.Ingestion/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-timelens};Username=${POSTGRES_USER:-timelens};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      InsertApi__GrpcUrl: http://insert:8081
      InsertApi__TokenEndpoint: ${INSERT_API_TOKEN_ENDPOINT:-}
      InsertApi__ClientId: ${INSERT_API_CLIENT_ID:-}
      InsertApi__ClientSecret: ${INSERT_API_CLIENT_SECRET:-}
      InsertApi__Scope: ${INSERT_API_SCOPE:-timelens.insert.write}
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-timelens}
      RabbitMq__UserName: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RabbitMq__ExchangeName: timelens.jobs
      RabbitMq__QueueName: timelens.ingestion.jobs
      Ingestion__LookbackHours: 48
      Ingestion__BatchSize: 500
      Ingestion__MinRequestIntervalSeconds: 3
      Ingestion__MaxEnergyChartsRetries: 3
      Ingestion__RetryBaseDelaySeconds: 10
    restart: unless-stopped
    depends_on:
      insert:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: src/TimeLens.Client/Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  clickhouse-data:
